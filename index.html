<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="CaféTrack">
<meta name="mobile-web-app-capable" content="yes">
<title>CaféTrack — Simulación de Eventos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg2: #181c27;
  --bg3: #1e2333;
  --surface: #252b3d;
  --surface2: #2d3450;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f2ff;
  --text2: #9ba3c0;
  --text3: #5c6480;
  --accent: #5c8fff;
  --accent2: #3d6fe8;
  --green: #3dd68c;
  --amber: #f9c846;
  --red: #ff5c5c;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --r: 14px;
  --r2: 10px;
  --tap: 48px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html {
  height: 100%;
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  min-height: 100%;
  min-height: 100dvh;
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  overscroll-behavior: contain;
}

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: env(safe-area-inset-top, 0px) 16px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: calc(56px + env(safe-area-inset-top, 0px));
  flex-shrink: 0;
}
.header-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-bottom: 10px; }
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.header-sub { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

/* ── TABS ── */
.tabs {
  position: sticky;
  top: calc(56px + env(safe-area-inset-top, 0px));
  z-index: 40;
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 1;
  min-width: 90px;
  padding: 12px 6px;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.3px;
  text-align: center; color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  text-transform: uppercase;
  white-space: nowrap;
  min-height: var(--tap);
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff;
  border-radius: 10px; font-size: 10px;
  padding: 1px 6px; min-width: 20px; height: 18px;
}
.tab-badge.done { background: var(--text3); }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; gap: 8px;
  padding: 10px 14px;
  overflow-x: auto; flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  background: var(--bg);
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 8px 16px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: var(--bg3); color: var(--text3);
  font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'Syne', sans-serif;
  white-space: nowrap; transition: all 0.12s;
  min-height: 36px; display: flex; align-items: center;
}
.filter-chip.active { background: rgba(92,143,255,0.15); border-color: rgba(92,143,255,0.5); color: var(--accent); }

/* ── MAIN SCROLL AREA ── */
.main {
  flex: 1;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 12px;
  padding-bottom: calc(80px + env(safe-area-inset-bottom, 16px));
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  right: 18px;
  z-index: 100;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--accent); border: none; color: #fff;
  font-size: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(92,143,255,0.45);
  transition: transform 0.15s, box-shadow 0.15s;
}
.fab:active { transform: scale(0.9); box-shadow: 0 2px 12px rgba(92,143,255,0.3); }

/* ── CLIENT CARD ── */
.client-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color 0.2s;
}
.client-card.active-card { border-color: rgba(92,143,255,0.25); }

.card-header {
  padding: 14px 16px 12px;
  display: flex; align-items: flex-start; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.card-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }
.card-name { font-size: 16px; font-weight: 800; margin-top: 2px; }
.card-status { display: flex; align-items: center; gap: 6px; }
.status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.status-dot.waiting  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.status-dot.ordering { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.status-dot.preparing{ background: var(--purple); box-shadow: 0 0 6px var(--purple); animation: pulse 1.5s infinite; }
.status-dot.ready    { background: var(--green);  box-shadow: 0 0 6px var(--green); }
.status-dot.cashier  { background: var(--amber);  box-shadow: 0 0 6px var(--amber); animation: pulse 1.5s infinite; }
.status-dot.done     { background: var(--text3); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.status-text { font-size: 12px; font-weight: 700; color: var(--text2); }
.card-timer { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--cyan); margin-top: 4px; }

/* ── EVENTS GRID ── */
.events-section { padding: 12px 14px; }
.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 10px;
}
.events-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.event-btn {
  padding: 12px 10px;
  border-radius: var(--r2);
  border: 1px solid var(--border2);
  background: var(--surface); color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 12px; font-weight: 700;
  cursor: pointer; text-align: left;
  transition: all 0.1s;
  display: flex; flex-direction: column; gap: 4px;
  min-height: 56px;
}
.event-btn:active { transform: scale(0.95); background: var(--surface2); }
.event-btn.done-btn { background: rgba(61,214,140,0.08); border-color: rgba(61,214,140,0.3); color: var(--green); }
.event-btn.locked { opacity: 0.3; cursor: not-allowed; }
.event-label { font-size: 12px; font-weight: 700; line-height: 1.3; }
.event-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); }

/* ── PROCESSES ── */
.parallel-section { padding: 0 14px 12px; }
.process-row {
  display: flex; align-items: center;
  gap: 8px; margin-bottom: 8px;
  padding: 10px 12px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2);
}
.process-label { font-size: 13px; font-weight: 600; color: var(--text2); flex: 1; display: flex; align-items: center; gap: 6px; }
.proc-btn {
  padding: 8px 14px;
  border-radius: 8px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--text);
  font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all 0.1s;
  font-family: 'Syne', sans-serif;
  white-space: nowrap; min-height: 36px;
}
.proc-btn:active { transform: scale(0.95); }
.proc-btn.running { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.4); color: var(--purple); }
.proc-btn.proc-done { background: rgba(61,214,140,0.1); border-color: rgba(61,214,140,0.3); color: var(--green); }
.proc-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); display: block; margin-top: 2px; text-align: right; }

/* ── ATTRS ── */
.attrs-section { padding: 0 14px 14px; }
.attrs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.attr-field { display: flex; flex-direction: column; gap: 5px; }
.attr-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text3); }
.attr-input {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2);
  color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 500;
  padding: 10px 12px; width: 100%; outline: none;
  min-height: var(--tap);
  transition: border-color 0.15s;
}
.attr-input:focus { border-color: var(--accent); }
select.attr-input { cursor: pointer; }
.notes-input { min-height: 72px; resize: none; }

/* ── CARD ACTIONS ── */
.card-actions {
  padding: 12px 14px;
  display: flex; gap: 10px;
  border-top: 1px solid var(--border);
}
.action-btn {
  flex: 1; padding: 12px;
  border-radius: var(--r2);
  border: 1px solid var(--border2);
  background: var(--surface); color: var(--text2);
  font-size: 13px; font-weight: 700;
  cursor: pointer; text-align: center;
  transition: all 0.1s; font-family: 'Syne', sans-serif;
  min-height: var(--tap);
}
.action-btn:active { transform: scale(0.96); }
.action-btn.finish-btn { background: rgba(61,214,140,0.1); border-color: rgba(61,214,140,0.35); color: var(--green); }
.action-btn.expand-btn.expanded { background: rgba(92,143,255,0.1); border-color: rgba(92,143,255,0.35); color: var(--accent); }

/* ── ITEMS MANAGER ── */
.items-section { padding: 0 14px 12px; }
.item-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2); margin-bottom: 6px;
}
.item-qty-btn {
  width: 36px; height: 36px;
  border-radius: 8px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--text);
  font-size: 18px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.1s;
}
.item-qty-btn:active { transform: scale(0.9); background: var(--surface2); }
.item-qty { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; min-width: 24px; text-align: center; color: var(--cyan); }
.item-name { flex: 1; font-size: 13px; font-weight: 600; }
.item-cat { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 12px; flex-shrink: 0; }
.item-cat.food  { background: rgba(249,200,70,0.15); color: var(--amber); border: 1px solid rgba(249,200,70,0.3); }
.item-cat.drink { background: rgba(34,211,238,0.12); color: var(--cyan);  border: 1px solid rgba(34,211,238,0.3); }
.item-cat.extra { background: rgba(167,139,250,0.12); color: var(--purple);border: 1px solid rgba(167,139,250,0.3); }
.item-del { width: 32px; height: 32px; border-radius: 8px; border: none; background: rgba(255,92,92,0.1); color: var(--red); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.add-item-row { display: flex; gap: 8px; margin-top: 8px; }
.add-item-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2); color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 14px;
  padding: 10px 12px; outline: none; min-width: 0;
  min-height: var(--tap);
}
.add-item-input:focus { border-color: var(--accent); }
.add-item-cat {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2); color: var(--text2);
  font-family: 'Syne', sans-serif; font-size: 13px;
  padding: 10px 8px; cursor: pointer; outline: none;
  flex-shrink: 0; min-height: var(--tap);
}
.add-item-btn {
  padding: 10px 16px; border-radius: var(--r2);
  border: 1px solid rgba(92,143,255,0.4);
  background: rgba(92,143,255,0.12); color: var(--accent);
  font-size: 20px; font-weight: 700; cursor: pointer; flex-shrink: 0;
  min-height: var(--tap); display: flex; align-items: center;
}
.items-summary { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.items-summary span { color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-weight: 700; }

/* ── CASHIER BADGE ── */
.cashier-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px; margin-left: 6px;
}
.cashier-badge.in-cashier { background: rgba(249,200,70,0.15); color: var(--amber); border: 1px solid rgba(249,200,70,0.3); }
.cashier-badge.paid { background: rgba(61,214,140,0.1); color: var(--green); border: 1px solid rgba(61,214,140,0.3); }

/* ── EXPORT PAGE ── */
.export-page { padding: 4px 0; display: flex; flex-direction: column; gap: 14px; }
.big-btn {
  width: 100%; padding: 18px;
  border-radius: var(--r); border: none;
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.15s; min-height: 58px;
}
.big-btn:active { transform: scale(0.97); }
.big-btn.export-xlsx { background: linear-gradient(135deg, #1f6feb, #388bfd); color: #fff; }
.big-btn.export-csv  { background: linear-gradient(135deg, #238636, #2ea043); color: #fff; }
.big-btn.danger { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); color: var(--red); }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px 14px; }
.stat-val { font-family: 'JetBrains Mono', monospace; font-size: 30px; font-weight: 700; }
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── HISTORY ── */
.history-item {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.history-info { flex: 1; }
.history-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }
.history-name { font-size: 14px; font-weight: 700; margin-top: 2px; }
.history-time { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}
.modal-sheet {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border2);
  padding: 20px 18px calc(28px + env(safe-area-inset-bottom, 0px));
  width: 100%; max-width: 540px;
  max-height: 92vh; overflow-y: auto;
}
.modal-handle { width: 40px; height: 4px; background: var(--surface2); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; }
.modal-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.modal-label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.modal-input {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r2); color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 500;
  padding: 14px 16px; width: 100%; outline: none; min-height: var(--tap);
}
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn {
  flex: 1; padding: 15px;
  border-radius: var(--r2); border: none;
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; min-height: var(--tap);
}
.modal-btn.primary { background: var(--accent); color: #fff; }
.modal-btn.secondary { background: var(--surface); color: var(--text2); }

/* ── CHIPS ── */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 10px 16px; border-radius: 24px;
  border: 1px solid var(--border2);
  background: var(--surface); color: var(--text2);
  font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.1s;
  font-family: 'Syne', sans-serif; min-height: 40px;
  display: flex; align-items: center;
}
.chip.selected { background: rgba(92,143,255,0.15); border-color: rgba(92,143,255,0.5); color: var(--accent); }
.chip:active { transform: scale(0.95); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: calc(84px + env(safe-area-inset-bottom, 0px));
  left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); padding: 11px 20px;
  border-radius: 24px; font-size: 13px; font-weight: 700;
  z-index: 300; pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
  white-space: nowrap; max-width: calc(100vw - 32px);
}
.toast.show { opacity: 1; }

/* ── CHECKBOX ── */
.checkbox-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.checkbox-row input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--accent); cursor: pointer; }
.checkbox-row label { font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; }

/* ── COLLAPSIBLE ── */
.collapse-content { overflow: hidden; transition: max-height 0.3s ease; }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 60px 24px; color: var(--text3); }
.empty-icon { font-size: 52px; margin-bottom: 16px; }
.empty-text { font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
.empty-sub { font-size: 14px; line-height: 1.5; }

/* ── COLUMNS INFO ── */
.columns-info {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-icon">☕</div>
      <div>
        <div class="header-title">CaféTrack</div>
        <div class="header-sub" id="session-id">··· · <span id="live-clock"></span></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="toggleDarkMode()" style="
        min-width:44px;min-height:44px;border-radius:10px;border:1px solid var(--border2);
        background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;
        display:flex;align-items:center;justify-content:center;
      " title="Tema">🌙</button>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-active" onclick="switchTab('active')">
    Activos <span class="tab-badge" id="badge-active">0</span>
  </div>
  <div class="tab" id="tab-done" onclick="switchTab('done')">
    Finalizados <span class="tab-badge done" id="badge-done">0</span>
  </div>
  <div class="tab" id="tab-export" onclick="switchTab('export')">Exportar</div>
</div>

<div id="filter-bar" class="filter-bar">
  <div class="filter-chip active" onclick="setFilter('all',this)">Todos</div>
  <div class="filter-chip" onclick="setFilter('waiting',this)">Esperando</div>
  <div class="filter-chip" onclick="setFilter('ordering',this)">Pedido</div>
  <div class="filter-chip" onclick="setFilter('cashier',this)">Caja</div>
  <div class="filter-chip" onclick="setFilter('preparing',this)">Preparación</div>
  <div class="filter-chip" onclick="setFilter('ready',this)">Listo</div>
</div>

<div class="main" id="main-content"></div>

<button class="fab" id="fab-btn" onclick="openNewClient()">+</button>
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" style="display:none;" onclick="closeModalBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo cliente</div>
    <div class="modal-field">
      <div class="modal-label">Nombre / Etiqueta</div>
      <input class="modal-input" id="new-name" placeholder="Ej: Mesa 3, Juan..." />
    </div>
    <div class="modal-field">
      <div class="modal-label">Tamaño del grupo</div>
      <input class="modal-input" id="new-group" type="number" min="1" value="1" />
    </div>
    <div class="modal-field">
      <div class="modal-label">Tipo de pedido</div>
      <div class="chip-row" id="order-type-chips">
        <div class="chip selected" onclick="selectChip(this,'order-type-chips')">Para aquí</div>
        <div class="chip" onclick="selectChip(this,'order-type-chips')">Para llevar</div>
        <div class="chip" onclick="selectChip(this,'order-type-chips')">Delivery</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="createClient()">Crear + Llegada</button>
    </div>
  </div>
</div>

<script>
const SESSION_ID = 'SES-' + String(Math.floor(Math.random()*9000)+1000);
document.getElementById('session-id').textContent = SESSION_ID + ' · ';
document.getElementById('session-id').appendChild(document.getElementById('live-clock') || (() => { const s = document.createElement('span'); s.id='live-clock'; return s; })());

let clients = [];
let clientCounter = 1;
try {
  clients = JSON.parse(localStorage.getItem('cafetrack_clients') || '[]');
  clientCounter = parseInt(localStorage.getItem('cafetrack_counter') || '1');
} catch(e) {}

let currentTab = 'active';
let currentFilter = 'all';
let isDark = true;

const EVENT_LABELS = [
  { key:'arrival',       label:'🚶 Llegada',        prereq: null },
  { key:'order_start',   label:'📋 Inicio pedido',  prereq: 'arrival' },
  { key:'order_end',     label:'✅ Fin pedido',      prereq: 'order_start' },
  { key:'prep_start',    label:'🍳 Inicio prep.',    prereq: 'order_end' },
  { key:'prep_end',      label:'✔️ Fin prep.',       prereq: 'prep_start' },
  { key:'delivery',      label:'🛎️ Entrega',         prereq: 'prep_end' },
  { key:'cashier_start', label:'💳 Inicio caja',     prereq: 'delivery' },
  { key:'cashier_end',   label:'🧾 Fin caja',        prereq: 'cashier_start' },
  { key:'departure',     label:'🚪 Salida',          prereq: 'cashier_end' },
];

const PROCESSES = [
  { key:'oven',           label:'Horno',      icon:'🔥' },
  { key:'coffee_machine', label:'Cafetera',   icon:'☕' },
  { key:'microwave',      label:'Microondas', icon:'📡' },
  { key:'blender',        label:'Licuadora',  icon:'🥤' },
];

const STATUS_MAP = {
  waiting:  { label:'Esperando',  dot:'waiting' },
  ordering: { label:'Pedido',     dot:'ordering' },
  cashier:  { label:'En caja',    dot:'cashier' },
  preparing:{ label:'Preparando', dot:'preparing' },
  ready:    { label:'Listo',      dot:'ready' },
  done:     { label:'Finalizado', dot:'done' },
};

function save() {
  localStorage.setItem('cafetrack_clients', JSON.stringify(clients));
  localStorage.setItem('cafetrack_counter', String(clientCounter));
}

function getStatus(c) {
  if (c.finished) return 'done';
  if (c.events.cashier_start && !c.events.cashier_end) return 'cashier';
  if (c.events.cashier_end) return 'ready';
  if (c.events.prep_start && !c.events.prep_end) return 'preparing';
  if (c.events.prep_end || c.events.delivery) return 'ready';
  if (c.events.order_start) return 'ordering';
  return 'waiting';
}

function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts).toTimeString().slice(0,8);
}

function elapsed(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts) / 1000);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function updateClocks() {
  const el = document.getElementById('live-clock');
  if (el) el.textContent = new Date().toTimeString().slice(0,8);
  document.querySelectorAll('[data-timer]').forEach(el => {
    const c = clients.find(x => x.id === el.dataset.timer);
    if (c && c.events.arrival && !c.finished) el.textContent = elapsed(c.events.arrival);
  });
}
setInterval(updateClocks, 1000);

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const fb = document.getElementById('filter-bar');
  fb.style.display = tab === 'active' ? 'flex' : 'none';
  document.getElementById('fab-btn').style.display = tab === 'export' ? 'none' : 'flex';
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const cont = document.getElementById('main-content');
  const active = clients.filter(c => !c.finished);
  const done   = clients.filter(c => c.finished);
  document.getElementById('badge-active').textContent = active.length;
  document.getElementById('badge-done').textContent   = done.length;

  if (currentTab === 'active') {
    let list = currentFilter === 'all' ? active : active.filter(c => getStatus(c) === currentFilter);
    if (!list.length) {
      cont.innerHTML = `<div class="empty-state"><div class="empty-icon">☕</div><div class="empty-text">Sin clientes activos</div><div class="empty-sub">Toca + para registrar un nuevo cliente</div></div>`;
      return;
    }
    cont.innerHTML = list.map(renderCard).join('');
  } else if (currentTab === 'done') {
    if (!done.length) {
      cont.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">Sin clientes finalizados</div><div class="empty-sub">Los clientes completados aparecerán aquí</div></div>`;
      return;
    }
    cont.innerHTML = done.map(renderHistoryItem).join('');
  } else {
    renderExport(cont);
  }
}

function renderCard(c) {
  const status = getStatus(c);
  const sm = STATUS_MAP[status];
  const expanded = c.expanded !== false;

  const eventsHtml = EVENT_LABELS.map(ev => {
    const done = !!c.events[ev.key];
    const locked = ev.prereq && !c.events[ev.prereq];
    let cls = 'event-btn';
    if (done) cls += ' done-btn';
    if (locked && !done) cls += ' locked';
    return `<button class="${cls}" onclick="recordEvent('${c.id}','${ev.key}')" ${locked && !done ? 'disabled' : ''}>
      <span class="event-label">${ev.label}</span>
      ${done ? `<span class="event-time">✓ ${fmtTime(c.events[ev.key])}</span>` : ''}
    </button>`;
  }).join('');

  const processesHtml = PROCESSES.map(p => {
    const proc = c.processes[p.key] || {};
    const running = proc.start && !proc.end;
    const pdone   = proc.start && proc.end;
    let btnLabel = 'Iniciar';
    let btnCls   = 'proc-btn';
    if (running) { btnLabel = 'Finalizar'; btnCls += ' running'; }
    if (pdone)   { btnLabel = 'Listo ✓';  btnCls += ' proc-done'; }
    return `<div class="process-row">
      <div class="process-label">${p.icon} ${p.label}</div>
      <div style="text-align:right">
        <button class="${btnCls}" onclick="toggleProcess('${c.id}','${p.key}')" ${pdone?'disabled':''}>${btnLabel}</button>
        ${proc.start ? `<span class="proc-time">${fmtTime(proc.start)}${proc.end ? ' → '+fmtTime(proc.end) : ' →?'}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  const orderTypeOpts = ['Para aquí','Para llevar','Delivery'].map(o =>
    `<option ${c.attrs.order_type===o?'selected':''}>${o}</option>`).join('');
  const paymentOpts = ['Efectivo','Tarjeta','Transferencia','Nequi','Otro'].map(o =>
    `<option ${c.attrs.payment===o?'selected':''}>${o}</option>`).join('');

  const items = c.order_items || [];
  const totalItems = items.reduce((s,i) => s + i.qty, 0);
  const itemsHtml = items.map((item, idx) => {
    const catCls = item.cat === 'Comida' ? 'food' : item.cat === 'Bebida' ? 'drink' : 'extra';
    return `<div class="item-row">
      <button class="item-qty-btn" onclick="changeItemQty('${c.id}',${idx},-1)">−</button>
      <span class="item-qty">${item.qty}</span>
      <button class="item-qty-btn" onclick="changeItemQty('${c.id}',${idx},1)">+</button>
      <span class="item-name">${item.name}</span>
      <span class="item-cat ${catCls}">${item.cat}</span>
      <button class="item-del" onclick="removeItem('${c.id}',${idx})">✕</button>
    </div>`;
  }).join('');

  const cashierDur = (c.events.cashier_start && c.events.cashier_end)
    ? Math.round((c.events.cashier_end - c.events.cashier_start)/1000) + 's' : '';

  return `<div class="client-card active-card" id="card-${c.id}">
    <div class="card-header">
      <div>
        <div class="card-id">#${c.id}</div>
        <div class="card-name">${c.name}${c.events.cashier_start && !c.events.cashier_end ? '<span class="cashier-badge in-cashier">💳 En caja</span>' : ''}${c.events.cashier_end ? '<span class="cashier-badge paid">✓ Pagado</span>' : ''}</div>
      </div>
      <div style="text-align:right">
        <div class="card-status">
          <div class="status-dot ${sm.dot}"></div>
          <span class="status-text">${sm.label}</span>
        </div>
        <div class="card-timer" data-timer="${c.id}">${c.events.arrival ? elapsed(c.events.arrival) : '--:--'}</div>
      </div>
    </div>
    <div class="collapse-content" style="max-height:${expanded ? '4000px' : '0'}">
      <div class="events-section">
        <div class="section-label">Eventos</div>
        <div class="events-grid">${eventsHtml}</div>
        ${cashierDur ? `<div style="margin-top:8px;font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;">⏱ Tiempo en caja: <span style="color:var(--amber);font-weight:700;">${cashierDur}</span></div>` : ''}
      </div>
      <div class="items-section">
        <div class="section-label">Ítems del pedido</div>
        <div class="items-summary">Total: <span>${totalItems}</span> ítem${totalItems!==1?'s':''}</div>
        ${itemsHtml}
        <div class="add-item-row">
          <input class="add-item-input" id="item-name-${c.id}" placeholder="Nombre del ítem..." onkeydown="if(event.key==='Enter')addItem('${c.id}')" />
          <select class="add-item-cat" id="item-cat-${c.id}">
            <option value="Comida">🍞</option>
            <option value="Bebida">☕</option>
            <option value="Extra">⭐</option>
          </select>
          <button class="add-item-btn" onclick="addItem('${c.id}')">+</button>
        </div>
      </div>
      <div class="parallel-section">
        <div class="section-label">Procesos paralelos</div>
        ${processesHtml}
      </div>
      <div class="attrs-section">
        <div class="section-label">Datos del pedido</div>
        <div class="attrs-grid">
          <div class="attr-field">
            <div class="attr-label">Grupo</div>
            <input class="attr-input" type="number" min="1" value="${c.attrs.group_size||1}" onchange="updateAttr('${c.id}','group_size',this.value)" />
          </div>
          <div class="attr-field">
            <div class="attr-label">Tipo pedido</div>
            <select class="attr-input" onchange="updateAttr('${c.id}','order_type',this.value)">${orderTypeOpts}</select>
          </div>
          <div class="attr-field">
            <div class="attr-label">Pago</div>
            <select class="attr-input" onchange="updateAttr('${c.id}','payment',this.value)">${paymentOpts}</select>
          </div>
          <div class="attr-field">
            <div class="attr-label">Con extras</div>
            <div class="checkbox-row">
              <input type="checkbox" id="extra-${c.id}" ${c.attrs.has_extras?'checked':''} onchange="updateAttr('${c.id}','has_extras',this.checked)" />
              <label for="extra-${c.id}">Sí</label>
            </div>
            ${c.attrs.has_extras ? `<input class="attr-input" style="padding:10px 12px;font-size:13px;" placeholder="Describir..." value="${c.attrs.extras_text||''}" onchange="updateAttr('${c.id}','extras_text',this.value)" />` : ''}
          </div>
          <div class="attr-field" style="grid-column:1/-1">
            <div class="attr-label">Notas</div>
            <textarea class="attr-input notes-input" placeholder="Observaciones..." onchange="updateAttr('${c.id}','notes',this.value)">${c.attrs.notes||''}</textarea>
          </div>
        </div>
      </div>
    </div>
    <div class="card-actions">
      <button class="action-btn expand-btn ${expanded?'expanded':''}" onclick="toggleExpand('${c.id}')">${expanded ? '▲ Colapsar' : '▼ Expandir'}</button>
      <button class="action-btn finish-btn" onclick="finishClient('${c.id}')">✓ Finalizar</button>
    </div>
  </div>`;
}

function renderHistoryItem(c) {
  const dur = (c.events.arrival && c.events.departure)
    ? Math.round((c.events.departure - c.events.arrival)/60000) + ' min'
    : c.events.arrival && c.finished_at
      ? Math.round((c.finished_at - c.events.arrival)/60000) + ' min' : '—';
  const totalItems = (c.order_items||[]).reduce((s,i)=>s+i.qty,0);
  const cashierDur = (c.events.cashier_start && c.events.cashier_end)
    ? ' · 💳 ' + Math.round((c.events.cashier_end-c.events.cashier_start)/1000) + 's caja' : '';
  return `<div class="history-item">
    <div class="history-dot" style="background:var(--green);"></div>
    <div class="history-info">
      <div class="history-id">#${c.id}</div>
      <div class="history-name">${c.name}</div>
      <div class="history-time">${c.attrs.order_type||'—'} · ${dur} · ${totalItems} ítems${cashierDur}</div>
    </div>
    <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;">${fmtTime(c.finished_at)}</div>
  </div>`;
}

function renderExport(cont) {
  const total  = clients.length;
  const active = clients.filter(c=>!c.finished).length;
  const completed = clients.filter(c=>c.events.arrival && c.events.departure);
  const avgTime = completed.length
    ? Math.round(completed.reduce((s,c)=>s+(c.events.departure-c.events.arrival),0)/completed.length/60000) + ' min'
    : '—';
  cont.innerHTML = `<div class="export-page">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Total clientes</div></div>
      <div class="stat-card"><div class="stat-val">${active}</div><div class="stat-lbl">Activos</div></div>
      <div class="stat-card"><div class="stat-val">${total-active}</div><div class="stat-lbl">Finalizados</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:22px;">${avgTime}</div><div class="stat-lbl">Tiempo prom.</div></div>
    </div>
    <button class="big-btn export-xlsx" onclick="exportXLSX()">📊 Exportar Excel (.xlsx)</button>
    <button class="big-btn export-csv"  onclick="exportCSV()">📄 Exportar CSV (.csv)</button>
    <div class="columns-info">
      <div class="section-label" style="margin-bottom:8px;">Columnas incluidas</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.9;">
        ID · Nombre · Llegada · Inicio pedido · Fin pedido · <strong style="color:var(--amber)">Inicio caja · Fin caja · Tiempo en caja (s)</strong> · Inicio prep. · Fin prep. · Entrega · Salida · Tiempo total · Grupo · Nº ítems · <strong style="color:var(--cyan)">Detalle ítems</strong> · Tipo pedido · Pago · Horno · Cafetera · Microondas · Licuadora · Extras · Notas
      </div>
    </div>
    <button class="big-btn danger" onclick="clearAll()">🗑️ Limpiar todos los datos</button>
  </div>`;
}

/* ── ACTIONS ── */
function openNewClient() {
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('new-name').focus(), 150);
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function closeModalBackdrop(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function selectChip(el, groupId) {
  document.querySelectorAll('#' + groupId + ' .chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
function getSelectedChip(groupId) {
  const sel = document.querySelector('#' + groupId + ' .chip.selected');
  return sel ? sel.textContent : '';
}

function createClient() {
  const name = document.getElementById('new-name').value.trim() || 'Cliente ' + clientCounter;
  const group = parseInt(document.getElementById('new-group').value) || 1;
  const orderType = getSelectedChip('order-type-chips');
  const id = 'C' + String(clientCounter).padStart(3,'0');
  clientCounter++;
  const c = {
    id, name,
    events: { arrival: Date.now() },
    processes: {},
    attrs: { group_size: group, order_type: orderType, payment: 'Efectivo', has_extras: false, extras_text: '', notes: '' },
    order_items: [],
    expanded: true,
    finished: false,
    finished_at: null,
    created_at: Date.now(),
    session: SESSION_ID,
  };
  clients.unshift(c);
  save();
  closeModal();
  document.getElementById('new-name').value = '';
  switchTab('active');
  showToast('✓ ' + name + ' — Llegada: ' + fmtTime(c.events.arrival));
}

function recordEvent(id, key) {
  const c = clients.find(x => x.id === id);
  if (!c || c.events[key]) { showToast('⚠ Evento ya registrado'); return; }
  const ev = EVENT_LABELS.find(e => e.key === key);
  if (ev && ev.prereq && !c.events[ev.prereq]) { showToast('⚠ Completa el paso anterior primero'); return; }
  c.events[key] = Date.now();
  save(); render();
  showToast('✓ ' + (ev ? ev.label : key) + ' — ' + fmtTime(c.events[key]));
}

function toggleProcess(id, procKey) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  if (!c.processes[procKey]) c.processes[procKey] = {};
  const proc = c.processes[procKey];
  const p = PROCESSES.find(x => x.key === procKey);
  if (!proc.start) {
    proc.start = Date.now();
    showToast('▶ ' + (p ? p.label : procKey) + ' iniciado');
  } else if (!proc.end) {
    proc.end = Date.now();
    showToast('⏹ ' + (p ? p.label : procKey) + ' — ' + Math.round((proc.end-proc.start)/1000) + 's');
  }
  save(); render();
}

function updateAttr(id, key, value) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  c.attrs[key] = value;
  save();
  if (key === 'has_extras') render();
}

function toggleExpand(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  c.expanded = !c.expanded;
  save(); render();
}

function addItem(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  const nameEl = document.getElementById('item-name-' + id);
  const catEl  = document.getElementById('item-cat-'  + id);
  const name = nameEl ? nameEl.value.trim() : '';
  if (!name) { showToast('⚠ Escribe el nombre del ítem'); return; }
  const cat = catEl ? catEl.value : 'Comida';
  if (!c.order_items) c.order_items = [];
  const existing = c.order_items.find(i => i.name.toLowerCase() === name.toLowerCase() && i.cat === cat);
  if (existing) existing.qty++;
  else c.order_items.push({ name, cat, qty: 1 });
  save(); render();
  showToast('✓ + ' + name);
}

function changeItemQty(id, idx, delta) {
  const c = clients.find(x => x.id === id);
  if (!c || !c.order_items[idx]) return;
  c.order_items[idx].qty += delta;
  if (c.order_items[idx].qty <= 0) c.order_items.splice(idx, 1);
  save(); render();
}

function removeItem(id, idx) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  c.order_items.splice(idx, 1);
  save(); render();
}

function finishClient(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  c.finished = true;
  c.finished_at = Date.now();
  save(); render();
  showToast('✓ ' + c.name + ' finalizado');
}

/* ── EXPORT ── */
function buildRows() {
  return clients.map(c => {
    const dur = (c.events.arrival && c.events.departure)
      ? ((c.events.departure-c.events.arrival)/60000).toFixed(1)
      : c.events.arrival && c.finished_at
        ? ((c.finished_at-c.events.arrival)/60000).toFixed(1) : '';
    const cashierDur = (c.events.cashier_start && c.events.cashier_end)
      ? Math.round((c.events.cashier_end-c.events.cashier_start)/1000) : '';
    const items = c.order_items || [];
    const row = {
      'Sesión': c.session, 'ID Cliente': c.id, 'Nombre': c.name,
      'Llegada': fmtTime(c.events.arrival),
      'Inicio Pedido': fmtTime(c.events.order_start),
      'Fin Pedido': fmtTime(c.events.order_end),
      'Inicio Preparación': fmtTime(c.events.prep_start),
      'Fin Preparación': fmtTime(c.events.prep_end),
      'Entrega': fmtTime(c.events.delivery),
      'Inicio Caja': fmtTime(c.events.cashier_start),
      'Fin Caja/Pago': fmtTime(c.events.cashier_end),
      'Tiempo en Caja (s)': cashierDur,
      'Salida': fmtTime(c.events.departure),
      'Tiempo Total (min)': dur,
      'Tamaño Grupo': c.attrs.group_size,
      'Nº Ítems': items.reduce((s,i)=>s+i.qty,0),
      'Detalle Ítems': items.map(i=>i.qty+'x '+i.name+' ('+i.cat+')').join('; '),
      'Tipo Pedido': c.attrs.order_type,
      'Tipo Pago': c.attrs.payment,
    };
    PROCESSES.forEach(p => {
      const proc = c.processes[p.key] || {};
      row['Inicio '+p.label] = fmtTime(proc.start);
      row['Fin '+p.label]    = fmtTime(proc.end);
      row['Dur. '+p.label+' (s)'] = (proc.start && proc.end) ? Math.round((proc.end-proc.start)/1000) : '';
    });
    row['Extras'] = c.attrs.has_extras ? (c.attrs.extras_text || 'Sí') : 'No';
    row['Notas']  = c.attrs.notes || '';
    row['Estado'] = c.finished ? 'Finalizado' : 'Activo';
    return row;
  });
}

function exportXLSX() {
  if (!clients.length) { showToast('⚠ Sin datos para exportar'); return; }
  const ws = XLSX.utils.json_to_sheet(buildRows());
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Datos');
  XLSX.writeFile(wb, 'cafetrack_' + new Date().toISOString().slice(0,10) + '.xlsx');
  showToast('✓ Excel exportado');
}

function exportCSV() {
  if (!clients.length) { showToast('⚠ Sin datos para exportar'); return; }
  const rows = buildRows();
  const keys = Object.keys(rows[0]);
  const csv = [keys.join(','), ...rows.map(r => keys.map(k => '"'+(r[k]||'')+'"').join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
  a.download = 'cafetrack_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('✓ CSV exportado');
}

function clearAll() {
  if (!confirm('¿Eliminar todos los datos? Esta acción no se puede deshacer.')) return;
  clients = []; clientCounter = 1;
  save(); render();
  showToast('✓ Datos eliminados');
}

function toggleDarkMode() {
  isDark = !isDark;
  document.documentElement.style.filter = isDark ? '' : 'invert(1) hue-rotate(180deg)';
}

render();
updateClocks();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
